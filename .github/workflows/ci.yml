name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs on the same branch (e.g. when you push twice quickly).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # React 19 has lingering peer-range mismatches in testing-library and a few
  # other libs that are technically compatible. --legacy-peer-deps is the
  # standard escape hatch and matches what we run locally.
  NPM_INSTALL_FLAGS: "--legacy-peer-deps --no-audit --no-fund"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Static analysis + unit/integration tests
  # ---------------------------------------------------------------------------
  lint-typecheck-unit:
    name: Lint · Typecheck · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit + integration tests
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # 2. Production build
  # ---------------------------------------------------------------------------
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: lint-typecheck-unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Build
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            public
            package.json
            next.config.mjs
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. End-to-end tests against the production build
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
